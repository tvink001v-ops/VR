<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VR Gyro</title>
<style>
body{background:#000;color:#fff;text-align:center;padding:20px;font-family:Arial}
#data{font-size:24px;color:#0f0;margin:20px}
#id{color:#888;font-size:12px}
</style>
</head>
<body>
<h1>VR Gyro Controller</h1>
<div id="id"></div>
<div id="data">Press START</div>
<button onclick="start()" style="padding:15px 30px;font-size:18px;background:#0f0;border:none;border-radius:10px">START</button>
<script>
const uid = Math.random().toString(36).substr(2,6);
document.getElementById('id').textContent = 'ID: '+uid;
let db = firebase.database();
function start(){
 if(DeviceOrientationEvent?.requestPermission){
  DeviceOrientationEvent.requestPermission().then(r=>{if(r=='granted')listen()})
 }else{listen()}
}
function listen(){
 window.addEventListener('deviceorientation',e=>{
  const d={alpha:e.alpha||0,beta:e.beta||0,gamma:e.gamma||0};
  document.getElementById('data').textContent=d.alpha.toFixed(1)+' '+d.beta.toFixed(1)+' '+d.gamma.toFixed(1);
  db.ref('gyro/'+uid).set(d);
 })
}
</script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>

firebase.initializeApp(fc);
</script>
</body>
</html>
