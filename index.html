<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Gyro</title>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 20px; font-family: Arial; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; }
        input { padding: 10px; font-size: 16px; width: 200px; }
    </style>
</head>
<body>
    <h1>VR Gyro Controller</h1>
    <p id="data">-</p>
    <input id="ip" value="192.168.0.15:5000">
    <button onclick="start()">START</button>
    <p id="status">-</p>
    
    <script>
        let ip = '';
        
        function start() {
            ip = document.getElementById('ip').value;
            
            if (DeviceOrientationEvent?.requestPermission) {
                DeviceOrientationEvent.requestPermission().then(r => {
                    if (r === 'granted') listen();
                });
            } else {
                listen();
            }
        }
        
        function listen() {
            window.addEventListener('deviceorientation', (e) => {
                const d = {alpha: e.alpha||0, beta: e.beta||0, gamma: e.gamma||0};
                document.getElementById('data').textContent = 
                    d.alpha.toFixed(1) + ' ' + d.beta.toFixed(1) + ' ' + d.gamma.toFixed(1);
                
                fetch('http://' + ip + '/gyro', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(d)
                }).then(() => {
                    document.getElementById('status').textContent = 'Sent';
                }).catch(() => {
                    document.getElementById('status').textContent = 'Error';
                });
            });
        }
    </script>
</body>
</html>
