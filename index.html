<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{background:#000;color:#fff;text-align:center;padding:20px;font-family:Arial}
button{padding:15px 30px;font-size:18px;background:#0f0;border:none;border-radius:10px}
input{padding:10px;font-size:16px;width:200px;margin:10px}
#data{font-size:20px;color:#0f0}
</style>
</head>
<body>
<h1>VR Gyro</h1>
<div id="data">-</div>
<input id="ip" value="192.168.0.15:5000">
<button onclick="connect()">CONNECT</button>
<button onclick="start()">START GYRO</button>

<script>
let ws;
function connect(){
 ws = new WebSocket('ws://'+document.getElementById('ip').value);
 ws.onopen = ()=>document.getElementById('data').textContent='Connected';
 ws.onclose = ()=>document.getElementById('data').textContent='Disconnected';
}
function start(){
 if(DeviceOrientationEvent?.requestPermission){
  DeviceOrientationEvent.requestPermission().then(r=>{if(r=='granted')listen()})
 }else{listen()}
}
function listen(){
 window.addEventListener('deviceorientation',e=>{
  const d={alpha:e.alpha||0,beta:e.beta||0,gamma:e.gamma||0};
  if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(d));
  document.getElementById('data').textContent=d.alpha.toFixed(1)+' '+d.beta.toFixed(1)+' '+d.gamma.toFixed(1);
 })
}
</script>
</body>
</html>
